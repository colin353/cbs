[[rust_binary]]
name = "https_client"
srcs = ["main.rs"]
cargo_deps = [
  { package = "bytes", version = "=1.10.1", default_features = false },
  { package = "http-body-util", version = "=0.1.3", default_features = false },
  { package = "hyper", version = "=1.7.0", default_features = false, features = ["client", "http1"] },
  { package = "hyper-rustls", version = "=0.27.7", default_features = false, features = ["http1", "ring", "webpki-roots"] },
  { package = "hyper-util", version = "=0.1.17", default_features = false, features = ["client", "client-legacy", "http1", "tokio"] },
  { package = "rustls", version = "=0.23.31", default_features = false, features = ["std", "ring"] },
  { package = "tokio", version = "=1.48.0", default_features = false, features = ["macros", "net", "rt-multi-thread"] },
]
